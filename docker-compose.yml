version: "3.9"

services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4001}:${PORT:-4001}"
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "dist/workers/index.js"]
    env_file: .env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
